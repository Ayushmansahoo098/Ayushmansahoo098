# GitHub Actions workflow to generate the 3D contribution calendar
# Generated SVGs are committed directly to the repo and referenced in README.md

name: GitHub Profile 3D Contrib

on:
  schedule:
    - cron: "0 6 * * *"  # Runs daily at 6:00 UTC
  workflow_dispatch:       # Allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update 3D contribution calendar" && git push)
