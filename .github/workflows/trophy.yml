# Generate GitHub Profile Trophy SVG statically
# Stores the trophy image in the repo so it never depends on external services

name: Generate Trophies

on:
  schedule:
    - cron: "0 12 * * *"  # Runs daily at noon UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Trophy SVG
        uses: ryo-ma/github-profile-trophy@v2
        with:
          username: Ayushmansahoo098
          output: trophy.svg
          theme: discord
          no-frame: true
          no-bg: true
          column: 7
          margin-w: 10

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trophy.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update trophy svg" && git push)
