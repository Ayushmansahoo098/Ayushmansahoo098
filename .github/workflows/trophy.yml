# Generate GitHub Profile Trophy SVG statically
# Downloads trophy SVG and commits it so it doesn't depend on external services at view time

name: Generate Trophies

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Trophy SVG
        run: |
          curl -s -o trophy.svg "https://github-profile-trophy.vercel.app/?username=Ayushmansahoo098&theme=discord&no-frame=true&no-bg=true&column=7&margin-w=10" || true
          # Check if we got a valid SVG (not an error page)
          if grep -q '<svg' trophy.svg 2>/dev/null; then
            echo "Trophy SVG generated successfully"
          else
            echo "Trophy service unavailable, skipping update"
            rm -f trophy.svg
            exit 0
          fi

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add trophy.svg 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update trophy svg" && git push)
