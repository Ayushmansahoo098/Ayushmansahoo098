# ===================================================
# SETUP INSTRUCTIONS:
# 1. Create your profile repo: Ayushmansahoo098/Ayushmansahoo098
# 2. Place this file at: .github/workflows/snake.yml
# 3. Go to repo Settings > Actions > General
#    → Set "Workflow permissions" to "Read and write permissions"
# 4. Run the workflow manually once (Actions tab → "Generate Snake" → "Run workflow")
# ===================================================

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake Game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Ayushmansahoo098
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
